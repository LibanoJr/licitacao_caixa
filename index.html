<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitura de Matrículas</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        .upload-area { border: 2px dashed #ccc; padding: 30px; text-align: center; margin-bottom: 20px; border-radius: 8px; }
        button { background: #0070f3; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:disabled { background: #ccc; }
        #resultado { white-space: pre-wrap; background: #f4f4f4; padding: 15px; border-radius: 5px; margin-top: 20px; display: none; }
        .erro { color: red; font-weight: bold; }
        .sucesso { color: green; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Extração de Dados de PDF (Matrículas)</h2>
    
    <form id="pdfForm">
        <div class="upload-area">
            <input type="file" id="pdfFile" accept="application/pdf" required>
            <p>Selecione o arquivo <strong>8787701133965.pdf</strong> ou outro PDF.</p>
        </div>
        <button type="submit" id="btnEnviar">Extrair Dados</button>
    </form>

    <div id="status"></div>
    <pre id="resultado"></pre>

    <script>
        document.getElementById('pdfForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fileInput = document.getElementById('pdfFile');
            const statusDiv = document.getElementById('status');
            const resultadoPre = document.getElementById('resultado');
            const btn = document.getElementById('btnEnviar');
            
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                btn.disabled = true;
                statusDiv.innerHTML = 'Processando...';
                
                const response = await fetch('/api/extract', {
                    method: 'POST',
                    body: formData
                });

                const dados = await response.json();

                // FORÇAMOS A EXIBIÇÃO: Independentemente do que venha, vamos mostrar no console e na tela
                console.log("Resposta bruta da API:", dados);
                
                statusDiv.innerHTML = 'Extração concluída!';
                resultadoPre.style.display = 'block';
                // Pega o que vier em 'resultado' ou 'conteudo'
                resultadoPre.textContent = dados.resultado || dados.conteudo || "Nenhum dado retornado pela IA.";

            } catch (erro) {
                statusDiv.innerHTML = `FALHA: ${erro.message}`;
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
